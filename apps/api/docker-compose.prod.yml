services:
  postgres:
    image: postgres:16-alpine
    container_name: anketa_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anketa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anketa}
      POSTGRES_DB: ${POSTGRES_DB:-anketa_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anketa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anketa_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-anketa}:${POSTGRES_PASSWORD:-anketa}@postgres:5432/${POSTGRES_DB:-anketa_prod}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
