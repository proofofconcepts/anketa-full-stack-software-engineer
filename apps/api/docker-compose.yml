services:
  postgres:
    image: postgres:16-alpine
    container_name: anketa_postgres
    environment:
      POSTGRES_USER: anketa
      POSTGRES_PASSWORD: anketa
      POSTGRES_DB: anketa_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anketa -d anketa_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
